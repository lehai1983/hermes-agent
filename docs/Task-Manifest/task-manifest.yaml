    path: .github/workflows/

priority_levels:
  P0: "blocking - cannot proceed to next milestone without this"
  P1: "important - impacts user experience significantly"
  P2: "nice-to-have - cosmetic, convenience, or legacy compat"

statuses:
  planned: task designed, not yet started
  in_progress: actively being worked on
  in_review: PR open, awaiting approval
  completed: merged, verified, closed
  cancelled: intentionally skipped
  blocked: depends on another task not yet completed
